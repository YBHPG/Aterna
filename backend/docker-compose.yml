services:
    postgres:
        image: postgres:15-alpine
        container_name: futurelater_postgres
        restart: unless-stopped
        env_file:
            - .env.development
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - app-network

    mongodb:
        image: mongo:6
        container_name: futurelater_mongodb
        restart: unless-stopped
        env_file:
            - .env.development
        ports:
            - "27018:27017"
        volumes:
            - mongodb_data:/data/db
        networks:
            - app-network

    redis:
        image: redis:7-alpine
        container_name: futurelater_redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app-network

networks:
    app-network:
        driver: bridge

volumes:
    postgres_data:
    mongodb_data:
    redis_data:
