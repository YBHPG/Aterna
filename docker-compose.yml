version: '3.8'

services:
  # 1. Бэкенд (основное API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - mongodb
      - redis
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env.production

  # 1.1 Воркер-процесс бэкенда (для фоновой отправки писем, описан в README)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["npm", "run", "start:prod:worker"]
    depends_on:
      - postgres
      - mongodb
      - redis
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env.production

  # 2. Фронтенд (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80" # Внутренний Nginx работает на порту 80, прокидываем наружу на 3001
    depends_on:
      - backend

  # 3. Инфраструктура (БД и брокер очередей)
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:4.4.18
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "127.0.0.1:27018:27017" # Порт 27018 пробрасывается на хост, как указано в вашем README
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
  mongodb_data: